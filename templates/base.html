{% load static %}
<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}JuniorekNieOblany{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'dist/styles.css' %}">
  <script src="https://unpkg.com/htmx.org@2.0.8" defer></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <header class="border-b border-slate-800 bg-slate-900">
    <nav class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4">
      <a href="{% url 'analysis-list' %}" class="text-lg font-bold text-cyan-300">
        JuniorekNieOblany
      </a>
      {% if user.is_authenticated %}
        <div class="flex items-center gap-4">
          <span class="text-sm text-slate-400">{{ user.username }}</span>
          <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button class="text-sm hover:text-cyan-300">Wyloguj</button>
          </form>
        </div>
      {% endif %}
    </nav>
  </header>
  <main class="mx-auto max-w-6xl px-4 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
