name: CI
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.2"
          python-version: "3.13.11"
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run pytest
        env:
          DATABASE_URL: sqlite:///:memory:
          DJANGO_SECRET_KEY: ci-only
          CELERY_TASK_ALWAYS_EAGER: "true"
